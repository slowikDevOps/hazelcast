name: Build Patched Hazelcast

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. Instalujemy Javę 21
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 2. Pobieramy i rozpakowujemy kod (niezawodny sposób bez użycia Git checkout)
    - name: Download and Extract Hazelcast Source
      run: |
        mkdir hazelcast-src
        cd hazelcast-src
        curl -L https://github.com/hazelcast/hazelcast/archive/refs/tags/v5.5.8.tar.gz | tar -xz --strip-components=1

    # 3. Zmieniamy wersję Jacksona w głównym pom.xml
    - name: Patch pom.xml
      run: |
        cd hazelcast-src
        sed -i 's/<jackson.version>.*<\/jackson.version>/<jackson.version>2.18.6<\/jackson.version>/g' pom.xml
        echo "Sprawdzam, czy podmiana się udała:"
        grep "<jackson.version>" pom.xml

    # 4. Budujemy projekt (wyłączamy testy i sprawdzanie stylu dla szybkości)
    - name: Build with Maven
      run: |
        cd hazelcast-src
        mvn clean package -DskipTests -Dcheckstyle.skip=true -Dspotbugs.skip=true -Dmaven.javadoc.skip=true

    # 5. Zapisujemy wynikowego JARa do pobrania
    - name: Upload Patched JAR
      uses: actions/upload-artifact@v4
      with:
        name: hazelcast-patched-jar
        # Ścieżka do wybudowanego pliku JAR
        path: hazelcast-src/hazelcast/target/hazelcast-*.jar
