name: Build Patched Hazelcast

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download and Extract Hazelcast Source
      run: |
        mkdir hazelcast-src
        cd hazelcast-src
        curl -fL https://github.com/hazelcast/hazelcast/archive/refs/tags/v5.6.0.tar.gz -o src.tar.gz || curl -fL https://github.com/hazelcast/hazelcast/archive/refs/tags/5.6.0.tar.gz -o src.tar.gz
        tar -xzf src.tar.gz --strip-components=1

    - name: Patch all pom.xml files
      run: |
        cd hazelcast-src
        find . -name "pom.xml" -type f -exec sed -i 's/<jackson.version>.*<\/jackson.version>/<jackson.version>2.18.6<\/jackson.version>/g' {} +
        grep -r "<jackson.version>" . || true

    - name: Build with Maven (Skip Tests & Assembly)
      run: |
        cd hazelcast-src
        # Dodaliśmy -Dassembly.skipAssembly=true oraz -Djacoco.skip=true
        mvn clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true -Dspotbugs.skip=true -Dmaven.javadoc.skip=true -Dassembly.skipAssembly=true -Djacoco.skip=true -Djackson.version=2.18.6 -Djackson.core.version=2.18.6 -Djackson.databind.version=2.18.6 -Djackson.annotations.version=2.18.6

    - name: Upload Patched JAR
      uses: actions/upload-artifact@v4
      with:
        name: hazelcast-patched-jar
        path: hazelcast-src/hazelcast/target/hazelcast-*.jar
