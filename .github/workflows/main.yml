name: Build Patched Hazelcast

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Zaktualizowany krok pobierania - teraz szuka wersji 5.6.0
    - name: Download and Extract Hazelcast Source
      run: |
        mkdir hazelcast-src
        cd hazelcast-src
        # Próbuje pobrać v5.6.0, a jeśli nie znajdzie, próbuje 5.6.0
        curl -fL https://github.com/hazelcast/hazelcast/archive/refs/tags/v5.6.0.tar.gz -o src.tar.gz || curl -fL https://github.com/hazelcast/hazelcast/archive/refs/tags/5.6.0.tar.gz -o src.tar.gz
        tar -xzf src.tar.gz --strip-components=1

    - name: Patch pom.xml
      run: |
        cd hazelcast-src
        sed -i 's/<jackson.version>.*<\/jackson.version>/<jackson.version>2.18.6<\/jackson.version>/g' pom.xml
        echo "Sprawdzam, czy podmiana się udała:"
        grep "<jackson.version>" pom.xml

    - name: Build with Maven
      run: |
        cd hazelcast-src
        mvn clean package -DskipTests -Dcheckstyle.skip=true -Dspotbugs.skip=true -Dmaven.javadoc.skip=true

    - name: Upload Patched JAR
      uses: actions/upload-artifact@v4
      with:
        name: hazelcast-patched-jar
        path: hazelcast-src/hazelcast/target/hazelcast-*.jar
