name: Build Patched Hazelcast

on: 
  workflow_dispatch: # To pozwala na ręczne uruchomienie przyciskiem!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. Pobieramy oficjalny kod z konkretnego tagu (nie z Twojego forka)
    - uses: actions/checkout@v4
      with:
        repository: hazelcast/hazelcast
        ref: v5.5.8 

    # 2. Instalujemy Javę
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 3. Zmieniamy wersję Jacksona "w locie" za pomocą narzędzia sed
    - name: Patch pom.xml
      run: |
        sed -i 's/<jackson.version>[^<]*<\/jackson.version>/<jackson.version>2.18.6<\/jackson.version>/g' pom.xml
        echo "Sprawdzam, czy podmiana się udała:"
        grep "<jackson.version>" pom.xml

    # 4. Budujemy projekt (bez testów)
    - name: Build with Maven
      run: mvn clean package -DskipTests -Dcheckstyle.skip=true -Dspotbugs.skip=true -Dmaven.javadoc.skip=true

    # 5. Zapisujemy wynikowego JARa do pobrania
    - name: Upload Patched JAR
      uses: actions/upload-artifact@v4
      with:
        name: hazelcast-patched-jar
        path: hazelcast/target/hazelcast-*.jar
